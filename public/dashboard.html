<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – Pharmacy</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">
  <div id="navbar"></div>
  <div class="dashboard-wrapper">
    <div class="cards-grid" id="statsCards"></div>
    <div class="grid md:grid-cols-2 gap-6 mb-8" id="alerts"></div>
    <div class="table-section">
      <div class="table-header">
        <h3><i class="fas fa-pills"></i> Recent Medicines</h3>
        <button class="btn-sm btn-primary" onclick="window.location.href='/medicines.html'">View All</button>
      </div>
      <div id="recentMedicinesTable"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
