<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Sale – Pharmacy</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">
  <div id="navbar"></div>
  <div class="dashboard-wrapper">
    <div class="table-section" style="max-width: 800px; margin: 0 auto;">
      <h3 class="text-xl font-bold mb-4"><i class="fas fa-cash-register"></i> New Sale</h3>
      <div class="form-group">
        <label>Select Medicine</label>
        <select id="medicineSelect" class="form-control" required>
          <option value="">-- Choose a medicine --</option>
        </select>
      </div>
      <div id="batchTableContainer" style="display:none; margin-top: 20px;">
        <h4 class="font-semibold mb-2">Available Batches</h4>
        <div id="batchTable" class="overflow-x-auto"></div>
      </div>
      <!-- Quantity modal -->
      <div id="quantityModal" class="modal-overlay" style="display:none;">
        <div class="modal-content" style="max-width: 400px;">
          <span class="modal-close" onclick="closeQuantityModal()">&times;</span>
          <h3 class="text-lg font-bold mb-3">Enter Quantity</h3>
          <p id="selectedBatchInfo" class="mb-3 text-sm"></p>
          <input type="number" id="saleQuantity" min="1" class="form-control mb-3" placeholder="Quantity">
          <p id="saleTotal" class="font-bold text-green-600 mb-3"></p>
          <button id="confirmSaleBtn" class="btn-sm btn-primary w-full">Confirm Sale</button>
          <div id="saleMessage" class="text-sm text-center mt-2"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    (async function() {
      if (!isAuthenticated()) window.location.href = '/login.html';
      loadNavbar();
      await initSaleTable();
    })();
  </script>
</body>
</html>
