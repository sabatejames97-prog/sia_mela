<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suppliers – Pharmacy</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">
  <div id="navbar"></div>
  <div class="dashboard-wrapper">
    <div class="table-section">
      <div class="table-header">
        <h3><i class="fas fa-truck"></i> Suppliers</h3>
        <button id="showAddSupplierBtn" class="btn-sm btn-primary" style="display: none;"><i class="fas fa-plus"></i> Add Supplier</button>
      </div>
      <div id="suppliersList"></div>
    </div>
  </div>

  <!-- Supplier Modal -->
  <div id="supplierModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <span class="modal-close" onclick="closeSupplierModal()">&times;</span>
      <h2 id="supplierModalTitle" class="text-xl font-bold mb-4">Add Supplier</h2>
      <form id="supplierForm">
        <input type="hidden" id="supplierId">
        <div class="form-group"><label>Supplier Name *</label><input type="text" id="supplierName" class="form-control" required></div>
        <div class="form-group"><label>Contact Person</label><input type="text" id="contactPerson" class="form-control"></div>
        <div class="form-group"><label>Phone</label><input type="text" id="phone" class="form-control"></div>
        <div class="form-group"><label>Email</label><input type="email" id="email" class="form-control"></div>
        <div class="form-group"><label>License Number</label><input type="text" id="license" class="form-control"></div>
        <button type="submit" class="btn-sm btn-primary w-full">Save</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
