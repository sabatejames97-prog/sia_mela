<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Pharmacy</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .login-card { width: 500px; max-width: 90%; padding: 2rem; }
    .login-input { padding: 0.9rem 1rem; font-size: 1rem; }
    .login-btn { padding: 0.9rem; font-size: 1.1rem; }
  </style>
</head>
<body class="bg-gray-100">
  <div class="min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl login-card transform transition-all hover:scale-105">
      <div class="text-center mb-8">
        <i class="fas fa-hospital-user text-6xl text-green-600"></i>
        <h1 class="text-3xl font-bold mt-3 text-gray-800">Pharmacy Login</h1>
        <p class="text-gray-500 text-base mt-1">Access your dashboard</p>
      </div>
      <div id="errorMsg" class="text-red-500 text-sm mb-4 hidden text-center"></div>
      <input type="email" id="email" placeholder="Email address" class="w-full border border-gray-300 login-input rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-green-500">
      <input type="password" id="password" placeholder="Password" class="w-full border border-gray-300 login-input rounded-xl mb-6 focus:outline-none focus:ring-2 focus:ring-green-500">
      <button id="loginBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold login-btn rounded-xl transition duration-200">Login</button>
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMsg');
      try {
        const res = await fetch(`${API_URL}/auth/local`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier: email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error.message);
        localStorage.setItem('jwt', data.jwt);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard.html';
      } catch (err) {
        errorDiv.classList.remove('hidden');
        errorDiv.innerText = err.message;
      }
    });
  </script>
</body>
</html>
